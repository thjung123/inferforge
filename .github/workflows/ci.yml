name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Install Triton client deps (inside uv venv)
        run: |
          . .venv/bin/activate
          uv pip install "tritonclient[grpc]==2.61.0"
          uv pip install grpcio protobuf python-rapidjson
      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Type check (mypy)
        run: uv run mypy .

      - name: Unit tests (pytest)
        run: uv run pytest -v tests/unit --maxfail=1 --disable-warnings

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint-type-test

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Install Triton client deps (inside uv venv)
        run: |
          . .venv/bin/activate
          uv pip install "tritonclient[grpc]==2.61.0"
          uv pip install grpcio protobuf python-rapidjson

      - name: Install Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Start docker-compose (gateway + redis)
        run: docker-compose -f docker/docker-compose.ci.yml up -d --build

      - name: Wait for Gateway to become ready
        run: |
          echo "Waiting for Gateway service..."
          for i in {1..180}; do
            if curl -fs http://localhost:8080/health > /dev/null; then
              echo "Gateway is ready!"
              exit 0
            fi
            if (( $i % 10 == 0 )); then
              echo "Still waiting... ($i s)"
              docker ps
              docker logs gateway --tail 10 || true
            fi
            sleep 1
          done
          echo "Gateway did not start in time" && exit 1

      - name: Run integration tests
        run: uv run pytest -v tests/integration --maxfail=1 --disable-warnings

      - name: Shutdown services
        if: always()
        run: docker-compose -f docker/docker-compose.ci.yml down -v
