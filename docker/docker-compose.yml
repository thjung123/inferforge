version: "3.8"

services:
  redis:
    container_name: redis
    image: redis:7-alpine
    expose:
      - "6379"

  triton:
    container_name: triton
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton
    volumes:
      - ../model_repository:/models
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"

  gateway:
    container_name: gateway
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
      args:
        MODE: prod
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_KEY_WHITELIST=["test-key"]
      - TRITON_URL=http://triton:8000
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - redis
      - triton
