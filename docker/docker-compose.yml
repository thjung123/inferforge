version: "3.8"

services:
  redis:
    container_name: redis
    image: redis:7-alpine
    expose:
      - "6379"

  triton:
    container_name: triton
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton
    volumes:
      - ../model_repository:/models
    shm_size: 1g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"

  builder:
    container_name: builder
    build:
      context: ..
      dockerfile: docker/Dockerfile.builder
    volumes:
      - ../model_repository:/models
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODEL_REPOSITORY=/models
      - TRITON_HTTP_URL=http://triton:8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - redis
      - triton

  vllm-primary:
    container_name: vllm-primary
    build:
      context: ..
      dockerfile: docker/Dockerfile.vllm
    command:
      - "--model"
      - "${VLLM_PRIMARY_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8100"
      - "--max-model-len"
      - "${VLLM_PRIMARY_MAX_MODEL_LEN:-4096}"
    env_file:
      - ../.env.vllm
    volumes:
      - hf_cache:/root/.cache/huggingface
    shm_size: 4g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    expose:
      - "8100"

  vllm-fallback:
    container_name: vllm-fallback
    build:
      context: ..
      dockerfile: docker/Dockerfile.vllm
    command:
      - "--model"
      - "${VLLM_FALLBACK_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8101"
      - "--max-model-len"
      - "${VLLM_FALLBACK_MAX_MODEL_LEN:-4096}"
    env_file:
      - ../.env.vllm
    volumes:
      - hf_cache:/root/.cache/huggingface
    shm_size: 2g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    expose:
      - "8101"

  gateway:
    container_name: gateway
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
      args:
        MODE: prod
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_KEY_WHITELIST=["test-key"]
      - TRITON_URL=triton:8001
      - VLLM_PRIMARY_URL=http://vllm-primary:8100
      - VLLM_FALLBACK_URL=http://vllm-fallback:8101
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - redis
      - triton
      - vllm-primary
      - vllm-fallback

volumes:
  hf_cache:
