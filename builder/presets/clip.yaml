model_type: clip
source: "openai/clip-vit-base-patch32"

submodels:
  - model_name: clip_text
    export_target: text_model
    inputs:
      - name: input_ids
        shape: [-1, -1]
        datatype: INT64
      - name: attention_mask
        shape: [-1, -1]
        datatype: INT64
    outputs:
      - name: text_embeds
        shape: [-1, 512]
        datatype: FP32
    precision:
      default: fp16
    dynamic_shapes:
      enabled: true
      input_ids:
        min: [1, 1]
        opt: [4, 77]
        max: [32, 77]
      attention_mask:
        min: [1, 1]
        opt: [4, 77]
        max: [32, 77]

  - model_name: clip_visual
    export_target: vision_model
    inputs:
      - name: pixel_values
        shape: [-1, 3, 224, 224]
        datatype: FP32
    outputs:
      - name: image_embeds
        shape: [-1, 512]
        datatype: FP32
    precision:
      default: fp16
    dynamic_shapes:
      enabled: true
      pixel_values:
        min: [1, 3, 224, 224]
        opt: [4, 3, 224, 224]
        max: [32, 3, 224, 224]
