services:
  redis:
    container_name: redis
    image: redis:7-alpine
    expose:
      - "6379"

  gateway:
    container_name: gateway
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
      args:
        MODE: prod
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_KEY_WHITELIST=["test-key"]
      - TRITON_URL=triton:8001
    depends_on:
      - redis
#      - triton
