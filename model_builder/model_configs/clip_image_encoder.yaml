model_name: clip_image_encoder
framework: pytorch

paths:
  source_model: "model_builder/example/weights/clip_image_encoder.pt"
  onnx_model: "model_repository/clip_image_encoder/clip_image_encoder.onnx"
  engine_model_dir: "model_repository/clip_image_encoder"

inputs:
  - name: "image"
    dtype: "float32"
    shape: [-1, 3, 224, 224]

outputs:
  - name: "image_embedding"
    dtype: "float32"
    shape: [-1, 512]

precision:
  default: "fp16"
  enable_int8: false

dynamic_shapes:
  enabled: true

triton:
  backend: "tensorrt"
  max_batch_size: 256
  instance_group:
    - count: 1
      kind: "KIND_GPU"
