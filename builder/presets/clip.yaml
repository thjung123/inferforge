model_type: clip
source: "openai/clip-vit-base-patch32"

submodels:
  - model_name: clip_text
    export_target: text_model
    inputs:
      - name: input_ids
        shape: [-1, -1]
        datatype: INT64
      - name: attention_mask
        shape: [-1, -1]
        datatype: INT64
    outputs:
      - name: text_embeds
        shape: [-1, 512]
        datatype: FP32
    precision:
      default: fp16
    dynamic_shapes:
      enabled: true
      input_ids:
        min: [1, 1]
        opt: [4, 77]
        max: [32, 77]
      attention_mask:
        min: [1, 1]
        opt: [4, 77]
        max: [32, 77]

  - model_name: clip_visual
    export_target: vision_model
    inputs:
      - name: pixel_values
        shape: [-1, 3, 224, 224]
        datatype: FP32
    outputs:
      - name: image_embeds
        shape: [-1, 512]
        datatype: FP32
    precision:
      default: fp16
    dynamic_shapes:
      enabled: true
      pixel_values:
        min: [1, 3, 224, 224]
        opt: [4, 3, 224, 224]
        max: [32, 3, 224, 224]

ensemble:
  name: clip_ensemble
  max_batch_size: 256
  inputs:
    - name: IMAGE_URLS
      datatype: STRING
      dims: [-1]
    - name: TEXTS
      datatype: STRING
      dims: [-1]
  outputs:
    - name: similarity
      datatype: FP32
      dims: [-1, -1]
  steps:
    - model_name: clip_image_preprocessor
      backend: python
      instance_kind: KIND_CPU
      inputs:
        - name: IMAGE_URLS
          datatype: STRING
          dims: [-1]
      outputs:
        - name: IMAGE_TENSOR
          datatype: FP32
          dims: [3, 224, 224]
      input_map:
        IMAGE_URLS: IMAGE_URLS
      output_map:
        IMAGE_TENSOR: IMAGE_TENSOR
    - model_name: clip_text_preprocessor
      backend: python
      instance_kind: KIND_CPU
      params:
        max_length: 77
      inputs:
        - name: TEXTS
          datatype: STRING
          dims: [-1]
      outputs:
        - name: INPUT_IDS
          datatype: INT32
        - name: ATTENTION_MASK
          datatype: INT32
      input_map:
        TEXTS: TEXTS
      output_map:
        INPUT_IDS: INPUT_IDS
        ATTENTION_MASK: ATTENTION_MASK
    - model_name: clip_visual
      input_map:
        pixel_values: IMAGE_TENSOR
      output_map:
        image_embeds: IMAGE_EMB
    - model_name: clip_text
      input_map:
        input_ids: INPUT_IDS
        attention_mask: ATTENTION_MASK
      output_map:
        text_embeds: TEXT_EMB
    - model_name: clip_feature_merger
      backend: python
      instance_kind: KIND_GPU
      inputs:
        - name: image_emb
          datatype: FP32
          dims: [-1]
        - name: text_emb
          datatype: FP32
          dims: [-1]
      outputs:
        - name: similarity
          datatype: FP32
          dims: [-1, -1]
      input_map:
        image_emb: IMAGE_EMB
        text_emb: TEXT_EMB
      output_map:
        similarity: similarity
