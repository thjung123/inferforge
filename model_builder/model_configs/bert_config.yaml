model_name: bert_encoder
framework: pytorch

paths:
  source_model: "weights/bert-base-uncased.pt"
  onnx_model: "model_repository/bert_encoder/bert_encoder.onnx"
  engine_model_dir: "model_repository/bert_encoder"

inputs:
  - name: "input_ids"
    dtype: "int32"
    shape: [1, 128]
  - name: "attention_mask"
    dtype: "int32"
    shape: [1, 128]
  - name: "token_type_ids"
    dtype: "int32"
    shape: [1, 128]

outputs:
  - name: "last_hidden_state"
    dtype: "float32"
    shape: [1, 128, 768]
  - name: "pooled_output"
    dtype: "float32"
    shape: [1, 768]

precision:
  default: "fp16"
  enable_int8: false

dynamic_shapes:
  enabled: true
  input_ids:
    min: [1, 8]
    opt: [1, 64]
    max: [1, 128]

triton:
  backend: "tensorrt"
  max_batch_size: 256
  instance_group:
    - count: 1
      kind: "KIND_GPU"
